name: Bug report
description: Report a reproducible bug in AIKit
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail to reproduce reliably.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug?
      placeholder: Concise description of the incorrect behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List exact steps and input needed to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces / screenshots
      description: Paste relevant logs or stack traces.
      render: shell

  - type: input
    id: aikit_version
    attributes:
      label: AIKit version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: swift_version
    attributes:
      label: Swift version
      placeholder: e.g. Swift 6.2
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS / platform
      placeholder: e.g. macOS 15.0, iOS 26 simulator
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues before filing this report.
          required: true
        - label: I can reproduce this on the latest main branch.
          required: false
